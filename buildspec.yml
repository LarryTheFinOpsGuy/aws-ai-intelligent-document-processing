version: 0.2

env:
  secrets-manager:
    DOCKERHUB_USERNAME: dockerhub/credentials:username
    DOCKERHUB_PASSWORD: dockerhub/credentials:password

phases:
  install:
    runtime-versions:
      python: 3.11
      nodejs: 20
    commands:
      - python -m pip install --upgrade pip
      - pip install -r guidance/agentic-orchestration/requirements.txt
      - pip install -r guidance/agentic-orchestration/infrastructure/requirements-dev.txt || true
      - npm install -g aws-cdk@2
      - npm install --prefix guidance/agentic-orchestration/ui/orchestrator
      - echo "$DOCKERHUB_PASSWORD" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
      - docker run --privileged --rm tonistiigi/binfmt --install all
  pre_build:
    commands:
      # Optional: pick environment
      - export ENV=dev
      - cd guidance/agentic-orchestration
      - cdk bootstrap --force
  build:
    commands:
      - python deploy.py --env $ENV --admin-email "larry.cusick@perficient.com"
